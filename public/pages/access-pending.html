<!-- access-pending.html - Page d'attente quand le compte n'a pas encore d'équipe -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès en attente - FootClub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page auth-register">
  <main class="auth-shell">
    <section class="auth-card auth-card--register">
      <header class="auth-card-header auth-card-header--register">
        <img src="/images/logo/1.png" alt="FootClub" class="site-logo" style="margin: 0 auto 12px;">
        <h1 class="auth-brand-title">FOOTCLUB</h1>
        <p class="auth-tagline">Accès en attente</p>
      </header>

      <div class="auth-content">
        <div class="field" style="gap: 12px; text-align: center;">
          <p style="color: #1b1b1d; font-size: 16px; line-height: 1.6; font-weight: 600;">
            Ton compte est créé.
          </p>

          <p style="color: #4b5563; font-size: 14px; line-height: 1.6;">
            Pour entrer dans la plateforme, il faut qu'un coach ou l'admin te rattache à une équipe.
          </p>

          <div class="note-panel" style="margin-top: 8px;">
            <span class="material-symbols-outlined">info</span>
            <p>Contacte ton coach ou l'administrateur du club.</p>
          </div>
        </div>

        <div class="auth-form" style="margin-top: 20px; gap: 12px;">
          <a class="auth-submit" href="/pages/home.html" style="background: var(--color-navy);">Retour à l'accueil</a>
        </div>
      </div>

      <footer class="auth-footer auth-footer--register">
        <p>Dès que ton équipe est liée à ton compte, tu pourras entrer dans la plateforme.</p>
      </footer>
    </section>
  </main>
</body>

</html>
