<!-- add-coach.html - Modale d'ajout d'entraîneur admin -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootClub - Ajouter un entraîneur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

  <body class="app-layout app-layout--teams modal-page">
  <main class="form-center">
    <div class="form-card modal-card--narrow" style="border-top: 4px solid var(--color-red); background: var(--color-white);">
      <div class="modal-header" style="padding-top: 28px; padding-bottom: 18px; align-items: flex-start;">
        <div>
          <h2 class="modal-title" style="margin-bottom: 12px;">Ajouter un entraîneur</h2>
          <p style="color: #374151; font-size: 16px; line-height: 1.6; max-width: 520px;">Assignez un membre du staff enregistré à cette équipe en sélectionnant son adresse e-mail.</p>
        </div>

        <a href="/pages/admin/teams.html" class="icon-button" aria-label="Fermer"
          style="width: 36px; height: 36px; color: #94a3b8;">
          <span class="material-symbols-outlined" style="font-size: 28px;">close</span>
        </a>
      </div>

      <form action="/pages/admin/teams.html" method="GET">
        <div class="modal-body"
          style="display: flex; flex-direction: column; gap: 24px; padding-top: 0; padding-bottom: 16px;">
          <div class="field-group">
            <br>
            <label for="coach-email">Sélectionner par email</label>
            <select id="coach-email" name="coach-email" style="appearance: none; padding: 12px; background: #fcfbfc;">
              <option value="" selected>Choisissez une adresse email...</option>
              <option value="j.dupont@footclub.com">j.dupont@footclub.com (Julien Dupont)</option>
              <option value="m.bernard@footclub.com">m.bernard@footclub.com (Mathieu Bernard)</option>
              <option value="a.lefevre@footclub.com">a.lefevre@footclub.com (Antoine Lefèvre)</option>
            </select>
            <p style="margin-top: 8px; color: #4b5563; font-size: 14px; line-height: 1.4;">Seuls les entraîneurs sans affectation (ou 1 seule) apparaissent ici.</p>
          </div>
        </div>

        <div style="display: flex; gap: 16px; padding-top: 8px;">
          <a href="/pages/admin/teams.html" class="btn-secondary" style="flex: 1 1 0; min-height: 48px; padding: 0 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;">Annuler</a>
          <button type="submit" class="btn-primary" style="flex: 1 1 0; min-height: 48px; padding: 0 22px; text-transform: uppercase; letter-spacing: 0.08em;">Ajouter</button>
        </div>
      </form>
    </div>
  </main>
</body>

</html>
