<!-- create-team.html - Modale de création d'équipe admin -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootClub - Créer une équipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

  <body class="app-layout app-layout--teams modal-page">
  <main class="form-center">
    <div class="form-card" style="border-top: 4px solid var(--color-red); background: var(--color-white);">
      <div class="modal-header" style="padding-top: 28px; padding-bottom: 18px; align-items: flex-start;">
        <div>
          <h2 class="modal-title" style="margin-bottom: 12px;">Créer une équipe</h2>
          <p style="color: #374151; font-size: 16px; line-height: 1.6; max-width: 520px;">Créez une nouvelle équipe et assignez-lui un ou deux entraîneurs si besoin.</p>
        </div>

        <a href="/pages/admin/teams.html" class="icon-button" aria-label="Fermer"
          style="width: 36px; height: 36px; color: #94a3b8;">
          <span class="material-symbols-outlined" style="font-size: 28px;">close</span>
        </a>
      </div>

      <form action="/pages/admin/teams.html" method="GET">
        <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px; padding-top: 0; padding-bottom: 16px;">
          <div class="field-group">
            <br>
            <label for="team-name">Nom de l'équipe</label>
            <input id="team-name" name="team-name" type="text" placeholder="Ex: U19 Nationaux">
          </div>

          <div class="field-group">
            <label for="coach-1">Entraîneur 1</label>
            <select id="coach-1" name="coach-1" style="appearance: none; padding: 12px;">
              <option value="" selected>Sélectionner un entraîneur</option>
              <option value="1">Jean Dupont (Principal)</option>
              <option value="2">Marc Lemaire (Adjoint)</option>
              <option value="3">Pierre Martin (Gardien)</option>
            </select>
          </div>

          <div class="field-group">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
              <label for="coach-2">Entraîneur 2</label>
              <span style="color: #6b7280; font-size: 14px; font-style: italic;">Optionnel</span>
            </div>
            <select id="coach-2" name="coach-2" style="appearance: none; padding: 12px;">
              <option value="" selected>Aucun</option>
              <option value="1">Jean Dupont (Principal)</option>
              <option value="2">Marc Lemaire (Adjoint)</option>
              <option value="3">Pierre Martin (Gardien)</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 16px; justify-content: center; padding-top: 20px; padding-bottom: 20px;">
          <a href="/pages/admin/teams.html" class="btn-secondary" style="flex: 1 1 0; min-height: 48px; padding: 0 22px; font-weight: 700;">Annuler</a>
          <button type="submit" class="btn-primary" style="flex: 1 1 0; min-height: 48px; padding: 0 22px;">Créer l'équipe</button>
        </div>
      </form>
    </div>
  </main>
</body>

</html>
