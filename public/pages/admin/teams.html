<!-- teams.html - Gestion des équipes -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Équipes - FootClub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="app-layout app-layout--teams">
  <div class="calendar-preview-shell">
    <header class="floating-header">
      <div class="floating-brand" aria-label="FootClub">
        <img src="/images/logo/4.png" alt="FootClub" class="site-logo site-logo--small">
        <span class="floating-brand-copy">
          <strong>FOOTCLUB</strong>
          <span>FC Ste-Croix</span>
        </span>
      </div>

      <div class="nav-toggle-wrapper">
        <input type="checkbox" id="nav-toggle" class="nav-toggle-input">
        <label for="nav-toggle" class="nav-toggle-overlay"></label>
        <label for="nav-toggle" class="nav-toggle-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </label>

        <nav class="floating-actions" aria-label="Navigation admin">
        <a href="/pages/admin/teams.html" class="floating-action is-active active" aria-current="page">
          <span class="material-symbols-outlined">sports_soccer</span>
          <span>Équipes</span>
        </a>
        <a href="/pages/admin/settings.html" class="floating-action">
          <span class="material-symbols-outlined">settings</span>
          <span>Paramètres</span>
        </a>
      </nav>
      </div>

      <a href="/auth/logout" class="floating-action floating-action--danger" aria-label="Se déconnecter">
        <span class="material-symbols-outlined">logout</span>
      </a>
    </header>

    <main class="content calendar-preview-content">
      <div class="page-head">
        <div>
          <h2>Équipes</h2>
          <p>Créez une équipe et associez-lui un entraîneur disponible.</p>
        </div>
      </div>

      <!-- ADMIN_TEAMS_MESSAGE -->

      <section class="panel-card" style="margin-bottom: 24px; max-width: 720px; padding: 32px;">
        <h3 style="margin-bottom: 16px;">Créer une équipe</h3>

        <form action="/admin/teams" method="POST" class="form-stack" style="padding: 8px 0 0;">
          <div class="field-group">
            <label for="team-name">Nom de l'équipe</label>
            <input id="team-name" name="name" type="text" required>
          </div>

          <div class="action-row" style="justify-content: flex-start;">
            <button type="submit" class="btn-primary" style="min-height: 48px; padding: 0 24px;">Créer l'équipe</button>
          </div>
        </form>
      </section>

      <section class="panel-grid panel-grid--teams">
        <!-- ADMIN_TEAMS_LIST -->
      </section>
    </main>
  </div>

  <script src="/js/admin-teams.js" defer></script>
</body>

</html>
