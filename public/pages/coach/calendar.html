<!-- JS: calendar-coach.js -->
<!-- calendar.html - Calendrier coach avec en-tête flottant expérimental -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootClub - Calendrier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="app-layout app-layout--calendar">
  <div class="calendar-preview-shell">
    <header class="floating-header">
      <div class="floating-brand" aria-label="FootClub">
        <img src="/images/logo/4.png" alt="FootClub" class="site-logo site-logo--small">
        <span class="floating-brand-copy">
          <strong>FOOTCLUB</strong>
          <span>FC Ste-Croix</span>
        </span>
      </div>

      <div class="nav-toggle-wrapper">
        <input type="checkbox" id="nav-toggle" class="nav-toggle-input">
        <label for="nav-toggle" class="nav-toggle-overlay"></label>
        <label for="nav-toggle" class="nav-toggle-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </label>

        <nav class="floating-actions" aria-label="Navigation entraîneur">
        <a href="/pages/coach/calendar.html" class="floating-action is-active active" aria-current="page">
          <span class="material-symbols-outlined">calendar_today</span>
          <span>Calendrier</span>
        </a>
        <a href="/pages/coach/team.html" class="floating-action">
          <span class="material-symbols-outlined">groups</span>
          <span>Mon équipe</span>
        </a>
        <a href="/pages/coach/settings.html" class="floating-action">
          <span class="material-symbols-outlined">settings</span>
          <span>Paramètres</span>
        </a>
      </nav>
      </div>

      <a href="/auth/logout" class="floating-action floating-action--danger" aria-label="Se déconnecter">
        <span class="material-symbols-outlined">logout</span>
      </a>
    </header>

    <main class="content calendar-preview-content">
      <section class="page-head calendar-page-head">
        <div>
          <h2>Saison : Printemps 2026</h2>
          <p>Gérez vos entraînements et matchs à venir.</p>
        </div>

        <div class="calendar-toolbar calendar-toolbar--compact">
          <div class="filter-pill is-active" data-filter="all" role="button" tabindex="0">
            <span>Tous</span>
          </div>
          <div class="filter-pill" data-filter="2" role="button" tabindex="0">
            <span>Matchs</span>
          </div>
          <div class="filter-pill" data-filter="1" role="button" tabindex="0">
            <span>Entraînements</span>
          </div>
        </div>
      </section>

      <section class="calendar-grid calendar-grid--coach" id="calendar-events"></section>

      <a href="/pages/coach/add-event.html" class="calendar-fab" aria-label="Ajouter un événement">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
      </a>
    </main>
  </div>
  </div>
  <script src="/js/calendar-coach.js" defer></script>
</body>

</html>
