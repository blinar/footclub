<!-- edit-event.html - Formulaire de modification d'événement coach -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootClub - Modifier l'événement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-layout app-layout--calendar modal-page">
  <main class="form-center">
    <div class="form-card" style="border-top:4px solid var(--color-red);background:var(--color-white);">
      <div class="modal-header" style="padding-top:28px;padding-bottom:18px;align-items:flex-start;">
        <div><h2 class="modal-title" style="margin-bottom:12px;">Modifier l'événement</h2><p style="color:#374151;font-size:16px;line-height:1.6;max-width:520px;">Modifiez les détails de l'événement.</p></div>
        <a href="/pages/coach/calendar.html" class="icon-button" aria-label="Fermer" style="width:36px;height:36px;color:#94a3b8;"><span class="material-symbols-outlined" style="font-size:28px;">close</span></a>
      </div>
      <form action="/coach/events/ID/update" method="POST">
        <div class="modal-body" style="display:flex;flex-direction:column;gap:24px;padding-top:0;padding-bottom:16px;">
            <br>
          <div class="field-group"><label for="type">Type</label><select id="type" name="type" required><option value="" disabled>Sélectionner un type</option><option value="1">Entraînement</option><option value="2">Match</option></select></div>
          <div class="field-group"><label for="title">Titre</label><input id="title" name="title" type="text" required></div>
          <div class="field-group"><label for="start_date">Date et heure de début</label><input id="start_date" name="start_date" type="datetime-local" required></div>
          <div class="field-group"><label for="end_date">Date et heure de fin</label><input id="end_date" name="end_date" type="datetime-local" required></div>
          <div class="field-group"><label for="convocation_date">Date et heure de convocation</label><input id="convocation_date" name="convocation_date" type="datetime-local" required></div>
          <div class="field-group"><label for="location">Lieu</label><input id="location" name="location" type="text" required></div>
          <div class="field-group" id="opponent-group"><label for="opponent">Adversaire</label><input id="opponent" name="opponent" type="text"></div>
        <br>
        </div>
        <div style="display:flex;gap:16px;padding-top:8px;"><a href="/pages/coach/calendar.html" class="btn-secondary" style="flex:1 1 0;min-height:48px;">Annuler</a><button type="submit" class="btn-primary" style="flex:1 1 0;min-height:48px;"><span>Enregistrer</span></button></div>
      </form>
    </div>
  </main>
  <script src="/js/edit-event.js" defer></script>
</body>
</html>
