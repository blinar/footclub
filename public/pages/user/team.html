<!-- JS: team-user.js -->
<!-- team.html - Vue équipe en lecture seule pour les joueurs -->
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FootClub - Mon équipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="app-layout app-layout--my-team">
  <div class="calendar-preview-shell">
    <header class="floating-header">
      <div class="floating-brand" aria-label="FootClub">
        <img src="/images/logo/4.png" alt="FootClub" class="site-logo site-logo--small">
        <span class="floating-brand-copy">
          <strong>FOOTCLUB</strong>
          <span>FC Ste-Croix</span>
        </span>
      </div>

      <div class="nav-toggle-wrapper">
        <input type="checkbox" id="nav-toggle" class="nav-toggle-input">
        <label for="nav-toggle" class="nav-toggle-overlay"></label>
        <label for="nav-toggle" class="nav-toggle-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </label>

        <nav class="floating-actions" aria-label="Navigation utilisateur">
          <a href="/pages/user/calendar.html" class="floating-action">
            <span class="material-symbols-outlined">calendar_today</span>
            <span>Calendrier</span>
          </a>
          <a href="/pages/user/team.html" class="floating-action is-active active" aria-current="page">
            <span class="material-symbols-outlined">groups</span>
            <span>Mon équipe</span>
          </a>
          <a href="/pages/user/settings.html" class="floating-action">
            <span class="material-symbols-outlined">settings</span>
            <span>Paramètres</span>
          </a>
        </nav>
      </div>

      <a href="/auth/logout" class="floating-action floating-action--danger" aria-label="Se déconnecter">
        <span class="material-symbols-outlined">logout</span>
      </a>
    </header>

    <main class="content calendar-preview-content">
      <div class="page-head" style="margin-bottom: 24px;">
        <div>
          <p
            style="color: var(--color-red); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;">
            Groupe Compétition</p>
          <h2 id="team-title">Mon équipe</h2>
          <p id="team-subtitle">Membres de votre équipe.</p>
        </div>
      </div>

      <section class="panel-card table-panel" id="team-section" style="display: none;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Joueur</th>
              <th>Contact</th>
              <th>Rôle</th>
            </tr>
          </thead>
          <tbody id="team-members">
            <!-- Données chargées par JavaScript -->
          </tbody>
        </table>
      </section>

      <!-- Affiché si le joueur n'est pas rattaché à une équipe -->
      <section id="no-team-section" style="display: none;">
        <div style="background: white; padding: 40px; border-radius: 8px; text-align: center;">
          <h2 style="color: #000; margin-bottom: 20px;">Vous n'êtes rattaché à aucune équipe</h2>
          <p style="color: #666; font-size: 16px; line-height: 1.6;">
            Veuillez contacter l'administration pour plus d'informations : <strong>fc-admin@footclub.com</strong>
          </p>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/team-user.js" defer></script>
</body>

</html>
